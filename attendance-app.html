<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AttendX – Corporate Attendance System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<style>
:root {
  --primary:#2563eb;--primary-d:#1d4ed8;--primary-l:#eff6ff;
  --sidebar:#0f172a;--sidebar-w:265px;
  --accent:#38bdf8;--success:#22c55e;--warning:#f59e0b;
  --danger:#ef4444;--info:#06b6d4;
  --bg:#f1f5f9;--card:#fff;
  --text:#1e293b;--muted:#64748b;--border:#e2e8f0;
  --radius:14px;--shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;}

/* AUTH */
.auth-wrap{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);}
.auth-card{background:#fff;border-radius:20px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.brand-badge{display:flex;align-items:center;gap:.5rem;font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;color:var(--primary);}
.brand-badge i{font-size:1.8rem;}
.auth-title{font-family:'Syne',sans-serif;font-weight:800;font-size:1.6rem;margin-bottom:.25rem;}
.auth-sub{color:var(--muted);margin-bottom:1.5rem;}

/* LAYOUT */
.dash-layout{display:flex;min-height:100vh;}
.sidebar{width:var(--sidebar-w);background:var(--sidebar);position:fixed;top:0;left:0;bottom:0;padding:1.25rem;z-index:100;overflow-y:auto;display:flex;flex-direction:column;}
.sidebar-brand{display:flex;align-items:center;gap:.5rem;font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:#fff;padding:.75rem 0 1.5rem;}
.sidebar-brand i{font-size:1.6rem;color:var(--accent);}
.sidebar-nav{display:flex;flex-direction:column;gap:.2rem;flex:1;}
.nav-divider{border-top:1px solid rgba(255,255,255,.08);margin:.6rem 0;}
.nav-section{font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;color:#475569;padding:.5rem .75rem .3rem;font-weight:600;}
.nav-item{display:flex;align-items:center;gap:.75rem;padding:.65rem .85rem;border-radius:10px;color:#94a3b8;text-decoration:none;font-size:.875rem;cursor:pointer;transition:all .18s;border:none;background:none;width:100%;text-align:left;}
.nav-item i{font-size:1.05rem;flex-shrink:0;}
.nav-item:hover{color:#fff;background:rgba(255,255,255,.07);}
.nav-item.active{color:#fff;background:var(--primary);}
.sidebar-user{display:flex;align-items:center;gap:.75rem;border-top:1px solid rgba(255,255,255,.08);padding-top:1rem;margin-top:.5rem;}
.user-av{width:36px;height:36px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;}
.user-name{color:#fff;font-size:.83rem;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.user-role{color:#64748b;font-size:.7rem;}
.btn-logout{background:none;border:none;color:#64748b;font-size:1.1rem;cursor:pointer;padding:.25rem;transition:color .2s;margin-left:auto;flex-shrink:0;}
.btn-logout:hover{color:var(--danger);}
.main-content{margin-left:var(--sidebar-w);flex:1;padding:2rem;min-height:100vh;}

/* PAGE */
.page-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:.75rem;}
.page-title{font-family:'Syne',sans-serif;font-size:1.55rem;font-weight:800;margin:0;line-height:1.2;}
.page-sub{color:var(--muted);font-size:.875rem;margin:.2rem 0 0;}
.page-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;color:var(--muted);}

/* CARD */
.card{border:1px solid var(--border)!important;border-radius:var(--radius)!important;box-shadow:var(--shadow)!important;}

/* STAT CARDS */
.stat-card{border-radius:var(--radius);padding:1.1rem 1.3rem;border:1px solid var(--border);background:var(--card);display:flex;align-items:center;gap:1rem;box-shadow:var(--shadow);}
.stat-icon{font-size:1.5rem;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stat-num{font-size:1.65rem;font-weight:800;font-family:'Syne',sans-serif;line-height:1;}
.stat-lbl{font-size:.73rem;color:var(--muted);margin-top:.2rem;}
.sc-green  .stat-icon{background:#dcfce7;color:#16a34a;}
.sc-red    .stat-icon{background:#fee2e2;color:#dc2626;}
.sc-amber  .stat-icon{background:#fef3c7;color:#d97706;}
.sc-blue   .stat-icon{background:#dbeafe;color:#2563eb;}
.sc-teal   .stat-icon{background:#ccfbf1;color:#0f766e;}
.sc-violet .stat-icon{background:#ede9fe;color:#7c3aed;}

/* TIME CHIPS */
.time-chip{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;border-radius:12px;flex:1;}
.time-chip i{font-size:1.3rem;}
.time-chip.in {background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;}
.time-chip.out{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;}
.tc-label{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.tc-time{font-size:1.15rem;font-weight:700;}

/* MINI STAT */
.mini-stat{background:var(--bg);border-radius:10px;padding:.75rem;display:flex;flex-direction:column;gap:.25rem;}
.ms-label{font-size:.72rem;color:var(--muted);}
.ms-val{font-size:1.05rem;font-weight:700;}
.month-progress .mp-label{display:flex;justify-content:space-between;margin-bottom:.5rem;font-size:.85rem;}

/* CALENDAR */
.cal-header-row{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;font-size:.73rem;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);padding:.5rem 0;border-bottom:1px solid var(--border);margin-bottom:.5rem;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-cell{border-radius:10px;padding:.4rem;min-height:64px;display:flex;flex-direction:column;align-items:center;gap:.15rem;cursor:pointer;transition:background .15s;border:1px solid transparent;font-size:.8rem;}
.cal-cell:hover{background:var(--bg);}
.cal-cell.empty{cursor:default;pointer-events:none;}
.cal-cell.today{border-color:var(--primary)!important;background:#eff6ff;}
.cal-cell.present{background:#f0fdf4;border-color:#bbf7d0;}
.cal-cell.late   {background:#fffbeb;border-color:#fde68a;}
.cal-cell.half   {background:#ecfeff;border-color:#a5f3fc;}
.cal-cell.absent {background:#fff1f2;border-color:#fecdd3;}
.cal-cell.weekend{background:#f8fafc;}
.cal-cell.holiday{background:#fdf4ff;border-color:#e9d5ff;}
.cal-day{font-weight:700;font-size:.85rem;}
.cal-time{font-size:.63rem;color:var(--muted);}
.cal-badge{font-size:.58rem;font-weight:700;border-radius:5px;padding:.1rem .28rem;}
.cal-badge.p {background:#dcfce7;color:#15803d;}
.cal-badge.l {background:#fef3c7;color:#92400e;}
.cal-badge.h {background:#cffafe;color:#0e7490;}
.cal-badge.a {background:#fee2e2;color:#b91c1c;}
.cal-badge.we{background:#e2e8f0;color:#64748b;}
.cal-badge.hd{background:#f3e8ff;color:#7e22ce;}
.cal-legend{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem;}
.leg{font-size:.7rem;padding:.2rem .45rem;border-radius:5px;font-weight:600;}
.leg.p {background:#dcfce7;color:#15803d;}
.leg.l {background:#fef3c7;color:#92400e;}
.leg.h {background:#cffafe;color:#0e7490;}
.leg.a {background:#fee2e2;color:#b91c1c;}
.leg.we{background:#e2e8f0;color:#64748b;}
.leg.hd{background:#f3e8ff;color:#7e22ce;}

/* TABLE */
.att-table{font-size:.875rem;}
.att-table thead{background:var(--bg);}
.att-table thead th{font-weight:600;font-size:.73rem;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);border-bottom:1px solid var(--border);padding:.85rem 1rem;}
.att-table tbody td{padding:.72rem 1rem;vertical-align:middle;border-color:var(--border);}
.mini-avatar{width:32px;height:32px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;flex-shrink:0;}

/* CHARTS */
.chart-wrap{position:relative;height:210px;}

/* TODAY LIVE */
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--success);display:inline-block;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.5);}}
.absent-pill{display:flex;align-items:center;gap:.6rem;padding:.45rem .75rem;background:#fff1f2;border:1px solid #fecdd3;border-radius:8px;font-size:.82rem;}

/* MODAL */
.modal-content{border-radius:16px!important;border:none!important;}

@media(max-width:768px){
  .sidebar{transform:translateX(-100%);transition:transform .3s;}
  .sidebar.open{transform:translateX(0);}
  .main-content{margin-left:0;padding:1rem;}
  .cal-cell{min-height:44px;}
}
</style>
</head>
<body>

<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:1rem;color:#64748b;">
    <div class="spinner-border text-primary"></div><p>Loading AttendX…</p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
// ═══════════════════════════════════════════════
//  FIREBASE IMPORTS
// ═══════════════════════════════════════════════
import { initializeApp }                          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword,
         signOut, onAuthStateChanged,
         createUserWithEmailAndPassword }          from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc,
         collection, getDocs, query, where,
         updateDoc, deleteDoc,
         serverTimestamp }                         from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ═══════════════════════════════════════════════
//  🔧 FIREBASE CONFIG
// ═══════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "AIzaSyAR-jmTdPeY0AKct61TlyePh1ek1kdCtU8",
  authDomain:        "attendapp-75d22.firebaseapp.com",
  projectId:         "attendapp-75d22",
  storageBucket:     "attendapp-75d22.firebasestorage.app",
  messagingSenderId: "252133726318",
  appId:             "1:252133726318:web:898c1610ca0803c5116e7f"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

// ═══════════════════════════════════════════════
//  GLOBALS
// ═══════════════════════════════════════════════
let currentUser = null, currentProfile = null, calMonth = new Date();
let _chartDay = null, _chartMonth = null, _chartYear = null;

// ═══════════════════════════════════════════════
//  AUTH STATE
// ═══════════════════════════════════════════════
onAuthStateChanged(auth, async (user) => {
  try {
    if (user) {
      currentUser = user;
      const snap = await getDoc(doc(db, "users", user.uid));
      if (snap.exists()) {
        currentProfile = { ...snap.data(), uid: user.uid };
        renderShell();
        switchPage("home");
      } else {
        showToast("Profile not found in database. Ask admin to add it.", "danger");
        await signOut(auth);
      }
    } else {
      currentUser = null; currentProfile = null;
      renderLogin();
    }
  } catch(e) { console.error("Auth error:", e); showToast("Connection error: "+e.message, "danger"); }
});

// ═══════════════════════════════════════════════
//  LOGIN PAGE
// ═══════════════════════════════════════════════
function renderLogin() {
  document.getElementById("app").innerHTML = `
    <div class="auth-wrap d-flex align-items-center justify-content-center vh-100">
      <div class="auth-card">
        <div class="brand-badge mb-4"><i class="bi bi-fingerprint"></i><span>AttendX</span></div>
        <h2 class="auth-title">Welcome back</h2>
        <p class="auth-sub">Sign in to your attendance portal</p>
        <div id="loginError" class="alert alert-danger d-none small py-2"></div>
        <div class="mb-3">
          <label class="form-label fw-medium">Email</label>
          <input id="loginEmail" type="email" class="form-control form-control-lg" placeholder="you@company.com"/>
        </div>
        <div class="mb-4">
          <label class="form-label fw-medium">Password</label>
          <div class="input-group">
            <input id="loginPass" type="password" class="form-control form-control-lg" placeholder="••••••••"/>
            <button class="btn btn-outline-secondary" type="button" onclick="window._togglePass()">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>
        <button class="btn btn-primary w-100 btn-lg fw-semibold" onclick="window._doLogin()">
          <span id="loginBtnText">Sign In</span>
        </button>
        <p class="text-center mt-3 text-muted small">New employee? Contact your admin for access.</p>
      </div>
    </div>`;
}

window._doLogin = async () => {
  const email = document.getElementById("loginEmail").value.trim();
  const pass  = document.getElementById("loginPass").value;
  const errEl = document.getElementById("loginError");
  const btn   = document.getElementById("loginBtnText");
  errEl.classList.add("d-none");
  if (!email || !pass) { errEl.textContent = "Enter email and password."; errEl.classList.remove("d-none"); return; }
  btn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Signing in…`;
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch(e) { errEl.textContent = authErr(e.code); errEl.classList.remove("d-none"); btn.textContent = "Sign In"; }
};

window._togglePass = () => {
  const inp = document.getElementById("loginPass");
  const ico = document.getElementById("eyeIcon");
  inp.type = inp.type === "password" ? "text" : "password";
  ico.className = inp.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
};

window._doLogout = async () => { await signOut(auth); };

// ═══════════════════════════════════════════════
//  DASHBOARD SHELL
// ═══════════════════════════════════════════════
function renderShell() {
  const isAdmin = currentProfile.role === "admin";
  document.getElementById("app").innerHTML = `
    <div class="dash-layout">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand"><i class="bi bi-fingerprint"></i><span>AttendX</span></div>
        <nav class="sidebar-nav">
          <button class="nav-item" data-page="home"            onclick="switchPage('home',this)"><i class="bi bi-house-door"></i><span>Dashboard</span></button>
          <button class="nav-item" data-page="calendar"        onclick="switchPage('calendar',this)"><i class="bi bi-calendar3"></i><span>My Calendar</span></button>
          <button class="nav-item" data-page="history"         onclick="switchPage('history',this)"><i class="bi bi-clock-history"></i><span>My History</span></button>
          ${isAdmin ? `
          <div class="nav-divider"></div>
          <div class="nav-section">Admin</div>
          <button class="nav-item" data-page="adminOverview"     onclick="switchPage('adminOverview',this)"><i class="bi bi-bar-chart-line"></i><span>Overview & Charts</span></button>
          <button class="nav-item" data-page="adminUsers"        onclick="switchPage('adminUsers',this)"><i class="bi bi-people"></i><span>All Employees</span></button>
          <button class="nav-item" data-page="adminAttendance"   onclick="switchPage('adminAttendance',this)"><i class="bi bi-table"></i><span>Attendance Records</span></button>
          <button class="nav-item" data-page="createUser"        onclick="switchPage('createUser',this)"><i class="bi bi-person-plus"></i><span>Add Employee</span></button>
          <button class="nav-item" data-page="holidays"          onclick="switchPage('holidays',this)"><i class="bi bi-calendar-x"></i><span>Holidays</span></button>
          <button class="nav-item" data-page="graceTime"         onclick="switchPage('graceTime',this)"><i class="bi bi-alarm"></i><span>Grace Time</span></button>
          ` : ""}
        </nav>
        <div class="sidebar-user">
          <div class="user-av">${initials(currentProfile.name)}</div>
          <div style="min-width:0;flex:1;">
            <div class="user-name">${currentProfile.name}</div>
            <div class="user-role">${currentProfile.role} · ${currentProfile.department || ""}</div>
          </div>
          <button class="btn-logout" onclick="window._doLogout()" title="Logout"><i class="bi bi-box-arrow-right"></i></button>
        </div>
      </aside>
      <main class="main-content" id="mainContent"></main>
    </div>

    <!-- EDIT ATTENDANCE MODAL -->
    <div class="modal fade" id="editModal" tabindex="-1">
      <div class="modal-dialog modal-sm"><div class="modal-content p-1">
        <div class="modal-header border-0 pb-0">
          <h6 class="modal-title fw-bold"><i class="bi bi-pencil-square me-2 text-primary"></i>Edit Attendance</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="editDocId"/>
          <div class="mb-3">
            <label class="form-label small fw-medium">Employee & Date</label>
            <input type="text" id="editDateDisplay" class="form-control" readonly/>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">Check In Time</label>
            <input type="time" id="editIn" class="form-control form-control-lg"/>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">Check Out Time</label>
            <input type="time" id="editOut" class="form-control form-control-lg"/>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-medium">Status</label>
            <select id="editStatus" class="form-select">
              <option>Present</option><option>Late</option>
              <option>Half Day</option><option>Absent</option><option>Leave</option>
            </select>
          </div>
        </div>
        <div class="modal-footer border-0 pt-0 gap-2">
          <button class="btn btn-outline-secondary flex-fill" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary flex-fill fw-semibold" onclick="window._saveEdit()">
            <i class="bi bi-save me-1"></i>Save Changes
          </button>
        </div>
      </div></div>
    </div>

    <!-- DAY DETAIL MODAL -->
    <div class="modal fade" id="dayModal" tabindex="-1">
      <div class="modal-dialog modal-sm"><div class="modal-content p-1">
        <div class="modal-header border-0 pb-0">
          <h6 class="modal-title fw-bold">Day Detail</h6>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="dayModalBody"></div>
      </div></div>
    </div>`;
}

// ═══════════════════════════════════════════════
//  PAGE ROUTER — single source, all pages
// ═══════════════════════════════════════════════
window.switchPage = (page, el) => {
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  if (el) el.classList.add("active");
  else { const t = document.querySelector(`[data-page="${page}"]`); if(t) t.classList.add("active"); }

  const mc = document.getElementById("mainContent");
  mc.innerHTML = `<div class="page-loading"><div class="spinner-border text-primary"></div><span>Loading…</span></div>`;

  // destroy old charts before re-rendering
  [_chartDay, _chartMonth, _chartYear].forEach(c => { try{ c && c.destroy(); }catch(e){} });
  _chartDay = _chartMonth = _chartYear = null;

  switch(page) {
    case "home":            pgHome(mc);            break;
    case "calendar":        pgCalendar(mc);        break;
    case "history":         pgHistory(mc);         break;
    case "adminOverview":   pgAdminOverview(mc);   break;
    case "adminUsers":      pgAdminUsers(mc);      break;
    case "adminAttendance": pgAdminAttendance(mc); break;
    case "createUser":      pgCreateUser(mc);      break;
    case "holidays":        pgHolidays(mc);        break;
    case "graceTime":       pgGraceTime(mc);       break;
    default: mc.innerHTML = `<p class="text-muted p-4">Page not found.</p>`;
  }
};

// ═══════════════════════════════════════════════
//  PAGE: HOME
// ═══════════════════════════════════════════════
async function pgHome(mc) {
  try {
    const today = todayKey();
    const snap  = await getDoc(doc(db, "attendance", `${currentProfile.uid}_${today}`));
    const rec   = snap.exists() ? snap.data() : null;
    const stats = await getMonthStats(currentProfile.uid);

    mc.innerHTML = `
      <div class="page-header">
        <div>
          <h1 class="page-title">Good ${greeting()}, ${(currentProfile.name||"").split(" ")[0]} 👋</h1>
          <p class="page-sub">${fmtDateLong(new Date())}</p>
        </div>
      </div>
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3"><div class="stat-card sc-green">
          <div class="stat-icon"><i class="bi bi-check-circle-fill"></i></div>
          <div><div class="stat-num">${stats.present}</div><div class="stat-lbl">Present</div></div>
        </div></div>
        <div class="col-6 col-md-3"><div class="stat-card sc-red">
          <div class="stat-icon"><i class="bi bi-x-circle-fill"></i></div>
          <div><div class="stat-num">${stats.absent}</div><div class="stat-lbl">Absent</div></div>
        </div></div>
        <div class="col-6 col-md-3"><div class="stat-card sc-amber">
          <div class="stat-icon"><i class="bi bi-clock-fill"></i></div>
          <div><div class="stat-num">${stats.late}</div><div class="stat-lbl">Late</div></div>
        </div></div>
        <div class="col-6 col-md-3"><div class="stat-card sc-blue">

window._checkIn = async () => {
  try {
    let cutoffH = 10, cutoffM = 0;
    const today = todayKey();
    const now   = new Date();
    try {
      const s = await getDoc(doc(db, "settings", "attendance"));
      if (s.exists()) {
        const ov = (s.data().dayOverrides || {})[today] || s.data().lateAfter || "10:00";
        [cutoffH, cutoffM] = ov.split(":").map(Number);
      }
    } catch(e) { console.log("Settings not found, using default 10:00"); }
    const late = now.getHours() > cutoffH || (now.getHours() === cutoffH && now.getMinutes() > cutoffM);
    await setDoc(doc(db, "attendance", `${currentProfile.uid}_${today}`), {
      uid: currentProfile.uid, name: currentProfile.name,
      department: currentProfile.department || "", date: today,
      inTime: fmtTime(now), outTime: null, workHours: null,
      status: late ? "Late" : "Present", timestamp: serverTimestamp()
    });
    showToast(`Checked in at ${fmtTime(now)} ✅`, "success");
    switchPage("home");
  } catch(e) { showToast("Error: " + e.message, "danger"); }
};

window._checkOut = async () => {
  try {
    const today = todayKey();
    const now   = new Date();
    const outT  = fmtTime(now);
    const ref   = doc(db, "attendance", `${currentProfile.uid}_${today}`);
    const snap  = await getDoc(ref);
    if (!snap.exists()) return;
    const wh     = calcHours(snap.data().inTime, outT);
    const status = wh < 4 ? "Half Day" : snap.data().status;
    await updateDoc(ref, { outTime: outT, workHours: wh, status });
    showToast(`Checked out at ${outT}. Worked ${wh}h 👍`, "success");
    switchPage("home");
  } catch(e) { showToast("Error: " + e.message, "danger"); }
};

async function pgCalendar(mc) {
  try {
    const year  = calMonth.getFullYear();
    const month = calMonth.getMonth();
    const mName = calMonth.toLocaleString("default", { month: "long", year: "numeric" });
    const days  = new Date(year, month + 1, 0).getDate();
    const first = new Date(year, month, 1).getDay();

    const [recs, hSnap] = await Promise.all([
      getUserMonthRecords(currentProfile.uid, calMonth),
      getDocs(collection(db, "holidays"))
    ]);
    const recMap = {}, holidays = {};
    recs.forEach(r => recMap[r.date] = r);
    hSnap.forEach(d => holidays[d.id] = d.data().name);

    let cells = "";
    for (let i = 0; i < first; i++) cells += `<div class="cal-cell empty"></div>`;
    for (let d = 1; d <= days; d++) {
      const key  = dateKey(year, month + 1, d);
      const rec  = recMap[key];
      const dow  = new Date(year, month, d).getDay();
      const isWE = dow === 0 || dow === 6;
      const isTd = key === todayKey();
      const isPast = new Date(year, month, d) < new Date() && !isTd;
      let cls = "cal-cell", badge = "";

      if (holidays[key]) {
        cls += " holiday"; badge = `<span class="cal-badge hd" title="${holidays[key]}">HOL</span>`;
      } else if (isWE) {
        cls += " weekend"; badge = `<span class="cal-badge we">WE</span>`;
      } else if (rec) {
        const st = rec.status;
        if (st === "Present")  { cls += " present"; badge = `<span class="cal-badge p">P</span>`; }
        else if (st === "Late")    { cls += " late";    badge = `<span class="cal-badge l">L</span>`; }
        else if (st === "Half Day"){ cls += " half";    badge = `<span class="cal-badge h">H</span>`; }
        else                       { cls += " absent";  badge = `<span class="cal-badge a">A</span>`; }
      } else if (isPast) {
        cls += " absent"; badge = `<span class="cal-badge a">A</span>`;
      }
      if (isTd) cls += " today";

      const tip = rec ? `${rec.inTime||""}${rec.outTime?" → "+rec.outTime:""}${rec.workHours?" ("+rec.workHours+"h)":""}` : "";
      cells += `
        <div class="${cls}" title="${tip}" onclick="window._showDay('${key}')">
          <span class="cal-day">${d}</span>${badge}
          ${rec && rec.inTime ? `<div class="cal-time">${rec.inTime}</div>` : ""}
        </div>`;
    }

    mc.innerHTML = `
      <div class="page-header"><h1 class="page-title">My Calendar</h1></div>
      <div class="card"><div class="card-body p-4">
        <div class="d-flex align-items-center justify-content-between mb-4">
          <button class="btn btn-outline-secondary btn-sm px-3" onclick="window._calNav(-1)"><i class="bi bi-chevron-left"></i></button>
          <h5 class="fw-bold mb-0">${mName}</h5>
          <button class="btn btn-outline-secondary btn-sm px-3" onclick="window._calNav(1)"><i class="bi bi-chevron-right"></i></button>
        </div>
        <div class="cal-legend">
          <span class="leg p">P Present</span><span class="leg l">L Late</span>
          <span class="leg h">H Half Day</span><span class="leg a">A Absent</span>
          <span class="leg we">WE Weekend</span><span class="leg hd">Holiday</span>
        </div>
        <div class="cal-header-row"><div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div></div>
        <div class="cal-grid">${cells}</div>
      </div></div>`;
  } catch(e) { mc.innerHTML = errBox(e.message); console.error(e); }
}

async function pgAdminOverview(mc) {
  try {
    const today = todayKey();

    const y     = now.getFullYear();
    const m     = now.getMonth() + 1;
    const mPad  = String(m).padStart(2, "0");
    const lastDay = new Date(y, m, 0).getDate();

    const [userSnap, todaySnap, monthSnap, yearSnap] = await Promise.all([
      getDocs(collection(db, "users")),
      getDocs(query(collection(db, "attendance"), where("date", "==", today))),
      getDocs(query(collection(db, "attendance"), where("date", ">=", `${y}-${mPad}-01`), where("date", "<=", `${y}-${mPad}-${lastDay}`))),
      getDocs(query(collection(db, "attendance"), where("date", ">=", `${y}-01-01`), where("date", "<=", `${y}-12-31`)))
    ]);

    const allUsers     = userSnap.docs.map(d => ({ ...d.data(), uid: d.id }));
    const totalEmp     = allUsers.length;
    const todayRecs    = todaySnap.docs.map(d => d.data());
    const presentToday = todayRecs.filter(r => r.status === "Present" || r.status === "Late").length;
    const lateToday    = todayRecs.filter(r => r.status === "Late").length;
    const absentToday  = totalEmp - presentToday;
    const checkedUIDs  = new Set(todayRecs.map(r => r.uid));
    const absentList   = allUsers.filter(u => !checkedUIDs.has(u.uid));

    const monthRecs = monthSnap.docs.map(d => d.data());
    const mPresent  = monthRecs.filter(r => r.status === "Present").length;
    const mLate     = monthRecs.filter(r => r.status === "Late").length;
    const mHalf     = monthRecs.filter(r => r.status === "Half Day").length;
    const mAbsent   = monthRecs.filter(r => r.status === "Absent").length;

    const byMonth = Array(12).fill(0);
    yearSnap.docs.forEach(d => {
      const r = d.data();
      if (r.status === "Present" || r.status === "Late") {
        const mo = parseInt(r.date.split("-")[1]) - 1;

    const todayRate = totalEmp ? Math.round((presentToday / totalEmp) * 100) : 0;

    mc.innerHTML = `
      <div class="page-header">
        <div>
          <h1 class="page-title">Admin Overview</h1>
          <p class="page-sub"><span class="live-dot me-1"></span>Live · ${fmtDateLong(new Date())}</p>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-6 col-md-2"><div class="stat-card sc-blue">
          <div class="stat-icon"><i class="bi bi-people-fill"></i></div>
          <div><div class="stat-num">${totalEmp}</div><div class="stat-lbl">Total Employees</div></div>
        </div></div>
        <div class="col-6 col-md-2"><div class="stat-card sc-green">
          <div class="stat-icon"><i class="bi bi-person-check-fill"></i></div>
          <div><div class="stat-num">${presentToday}</div><div class="stat-lbl">Present Today</div></div>
        </div></div>
        <div class="col-6 col-md-2"><div class="stat-card sc-red">
          <div class="stat-icon"><i class="bi bi-person-x-fill"></i></div>
          <div><div class="stat-num">${absentToday}</div><div class="stat-lbl">Absent Today</div></div>
        </div></div>
        <div class="col-6 col-md-2"><div class="stat-card sc-amber">
          <div class="stat-icon"><i class="bi bi-clock-fill"></i></div>
          <div><div class="stat-num">${lateToday}</div><div class="stat-lbl">Late Today</div></div>
        </div></div>
        <div class="col-6 col-md-2"><div class="stat-card sc-teal">

          <div><div class="stat-num">${mPresent + mLate}</div><div class="stat-lbl">Month Present</div></div>
        </div></div>
        <div class="col-6 col-md-2"><div class="stat-card sc-violet">
          <div class="stat-icon"><i class="bi bi-graph-up"></i></div>
          <div><div class="stat-num">${todayRate}%</div><div class="stat-lbl">Today Rate</div></div>
        </div></div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-4"><div class="card h-100"><div class="card-body p-4">
          <h6 class="fw-bold mb-3">Today's Breakdown</h6>
          <div class="chart-wrap"><canvas id="chartDay"></canvas></div>

        <div class="col-md-4"><div class="card h-100"><div class="card-body p-4">

          <div class="chart-wrap"><canvas id="chartMonth"></canvas></div>

    setTimeout(() => {

          datasets: [{ data: [presentToday - lateToday, absentToday, lateToday],
            backgroundColor: ["#22c55e", "#ef4444", "#f59e0b"], borderWidth: 0 }] },

    const wh = (inT && outT) ? calcHours(inT, outT) : null;
    await updateDoc(doc(db, "attendance", docId), {
      inTime: inT || null, outTime: outT || null, workHours: wh, status
    });
    showToast("Attendance updated ✅", "success");
    bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
    // reload current page
    const active = document.querySelector(".nav-item.active");
    if (active) switchPage(active.dataset.page);
  } catch(e) { showToast("Error: " + e.message, "danger"); }
};

window._filteredRows = [];
window._applyFilters = async () => {
  const from   = document.getElementById("fFrom").value;
  const to     = document.getElementById("fTo").value;
  const dept   = document.getElementById("fDept").value;
  const status = document.getElementById("fStatus").value;

  tbody.innerHTML = `<tr><td colspan="8" class="text-center py-3"><div class="spinner-border spinner-border-sm text-primary"></div> Loading…</td></tr>`;

  try {
    const snap = await getDocs(collection(db, "attendance"));
    let rows   = snap.docs.map(d => d.data());
    if (from)   rows = rows.filter(r => r.date >= from);
    if (to)     rows = rows.filter(r => r.date <= to);
    if (dept)   rows = rows.filter(r => r.department === dept);
    if (status) rows = rows.filter(r => r.status === status);
    if (name)   rows = rows.filter(r => (r.name||"").toLowerCase().includes(name));
    rows.sort((a,b) => b.date.localeCompare(a.date));
    window._filteredRows = rows;

    if (!rows.length) { tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">No records found.</td></tr>`; return; }
    tbody.innerHTML = rows.map(r => `
      <tr>

        <td>${r.inTime||"—"}</td><td>${r.outTime||"—"}</td>
        <td>${r.workHours ? r.workHours+"h" : "—"}</td>
        <td><button class="btn btn-sm btn-outline-warning"
          onclick="window._openEdit('${r.uid}_${r.date}','${r.date}','${r.inTime||""}','${r.outTime||""}','${r.status}','${(r.name||"").replace(/'/g,"\\'")}')">

        </button></td>
      </tr>`).join("");
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">${e.message}</td></tr>`;
  }
};
window._clearFilters = () => {

window._createEmp = async () => {
  const name  = document.getElementById("cuName").value.trim();

  const pass  = document.getElementById("cuPass").value;
  const dept  = document.getElementById("cuDept").value.trim();

  const errEl = document.getElementById("cuErr");

  try {
    const secApp  = (await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js")).initializeApp(firebaseConfig, "sec_" + Date.now());
    const secAuth = (await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js")).getAuth(secApp);

    await (await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js")).signOut(secAuth);
    await setDoc(doc(db, "users", cred.user.uid), { name, email, department: dept, designation: des, employeeId: empId, role, createdAt: serverTimestamp() });

// ═══════════════════════════════════════════════
async function getUserMonthRecords(uid, date) {
  const y = date.getFullYear(), m = String(date.getMonth()+1).padStart(2,"0");
  const snap = await getDocs(query(collection(db,"attendance"),
    where("uid","==",uid), where("date",">=",`${y}-${m}-01`), where("date","<=",`${y}-${m}-31`)));
  return snap.docs.map(d => d.data());
}

async function getMonthStats(uid) {
  const now  = new Date();
  const recs = await getUserMonthRecords(uid, now);
  const daysPassed = now.getDate();
  let workingDays = 0;
  for (let d = 1; d <= daysPassed; d++) {
    const dow = new Date(now.getFullYear(), now.getMonth(), d).getDay();
    if (dow !== 0 && dow !== 6) workingDays++;
  }
  const present = recs.filter(r => r.status === "Present").length;
  const late    = recs.filter(r => r.status === "Late").length;
  const half    = recs.filter(r => r.status === "Half Day").length;
  const leaves  = recs.filter(r => r.status === "Leave").length;
  const absent  = Math.max(0, workingDays - present - late - half - leaves);
  const totalH  = recs.reduce((a,r) => a + (r.workHours||0), 0);
  const avgHours= recs.length ? (totalH/recs.length).toFixed(1) : 0;
  const rate    = workingDays ? Math.round(((present+late+half)/workingDays)*100) : 0;
  return { present, late, half, absent, leaves, totalHours: totalH.toFixed(1), avgHours, rate, workingDays, daysPassed };
}

function todayKey() { const n=new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,"0")}-${String(n.getDate()).padStart(2,"0")}`; }
function dateKey(y,m,d) { return `${y}-${String(m).padStart(2,"0")}-${String(d).padStart(2,"0")}`; }
function fmtTime(d) { return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; }
function calcHours(inT,outT) { const [ih,im]=inT.split(":").map(Number); const [oh,om]=outT.split(":").map(Number); return +((oh*60+om-ih*60-im)/60).toFixed(1); }
function fmtDateLong(d) { return d.toLocaleDateString("en-IN",{weekday:"long",year:"numeric",month:"long",day:"numeric"}); }
function greeting() { const h=new Date().getHours(); return h<12?"Morning":h<17?"Afternoon":"Evening"; }
function initials(name) { if(!name)return"?"; return name.trim().split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function sBadge(s) { return s==="Present"?"bg-success":s==="Late"?"bg-warning text-dark":s==="Half Day"?"bg-info text-dark":s==="Leave"?"bg-primary":"bg-danger"; }
function errBox(msg) { return `<div class="alert alert-danger m-4"><i class="bi bi-exclamation-triangle me-2"></i>${msg}</div>`; }
function authErr(code) {
  const m = {
    "auth/wrong-password":"Incorrect password.",
    "auth/user-not-found":"No account found with this email.",
    "auth/invalid-email":"Invalid email address.",
    "auth/email-already-in-use":"This email is already registered.",
    "auth/weak-password":"Password must be at least 6 characters.",
    "auth/too-many-requests":"Too many attempts. Please try later.",
    "auth/invalid-credential":"Incorrect email or password."
  };
  return m[code] || "Something went wrong. Please try again.";
}

function showToast(msg, type="success") {
  let tc = document.getElementById("toastCont");
  if (!tc) { tc=document.createElement("div"); tc.id="toastCont"; tc.style.cssText="position:fixed;top:1rem;right:1rem;z-index:9999;display:flex;flex-direction:column;gap:.5rem;max-width:320px;"; document.body.appendChild(tc); }
  const t = document.createElement("div");
  t.className = `toast show align-items-center text-bg-${type} border-0 rounded-3`;
  t.setAttribute("role","alert");
  t.innerHTML = `<div class="d-flex"><div class="toast-body">${msg}</div><button type="button" class="btn-close btn-close-white me-2 m-auto" onclick="this.closest('.toast').remove()"></button></div>`;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 4500);
}

window.exportXL = (rows, filename) => {
  if (!rows||!rows.length) { showToast("No data to export.", "warning"); return; }
  const data = rows.map(r => ({
    "Date": r.date, "Employee": r.name, "Department": r.department,
    "Status": r.status, "Check In": r.inTime||"", "Check Out": r.outTime||"", "Hours Worked": r.workHours||""
  }));
  const ws = XLSX.utils.json_to_sheet(data);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Attendance");
  XLSX.writeFile(wb, `${filename}.xlsx`);
  showToast("Excel exported successfully!", "success");
};
